[build]
builder = "dockerfile"

[deploy]
startCommand = "gunicorn django_app.wsgi:application --bind 0.0.0.0:$PORT --workers 4"

[[services]]
name = "web"
startCommand = "gunicorn django_app.wsgi:application --bind 0.0.0.0:$PORT --workers 4"

[[services]]
name = "worker"
startCommand = "celery -A django_app worker -l info"

[[services]]
name = "beat"
startCommand = "celery -A django_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
